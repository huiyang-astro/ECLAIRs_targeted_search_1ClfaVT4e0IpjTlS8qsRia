let currentDatasetId = "all";


// ============================================================
// UPDATE T90 CHART
// ============================================================

function updateT90Chart() {


    const data =
        plotData[currentDatasetId];


    const scale =
        document
            .getElementById("t90Scale")
            .value;


    const numberOfBins =
        Number(
            document
                .getElementById("t90Bins")
                .value
        );


    let values =
        data.t90.filter(
            function(value) {
                return Number.isFinite(value);
            }
        );


    if (values.length === 0) {

        Plotly.purge("t90Chart");

        document
            .getElementById("t90Chart")
            .innerHTML =
                '<div class="warning">'
                + 'No valid T90 values found.'
                + '</div>';

        return;
    }


    // ========================================================
    // LINEAR HISTOGRAM
    // ========================================================

    if (scale === "linear") {


        document
            .getElementById("t90Info")
            .textContent =

                "Dataset: "
                + data.label

                + " | Values: "
                + values.length

                + " | Scale: linear"

                + " | Bins: "
                + numberOfBins;


        Plotly.react(

            "t90Chart",

            [
                {
                    x:
                        values,

                    type:
                        "histogram",

                    nbinsx:
                        numberOfBins,

                    hovertemplate:
                        "T90: %{x:.4g} s<br>"
                        + "Count: %{y}"
                        + "<extra></extra>"
                }
            ],

            {
                title:
                    data.label
                    + " — T90 Distribution (Linear)",

                xaxis: {
                    title: "T90 (seconds)",
                    type: "linear",
                    autorange: true
                },

                yaxis: {
                    title: "Number of events",
                    type: "linear",
                    autorange: true
                },

                bargap: 0.05,

                margin: {
                    t: 60,
                    l: 70,
                    r: 30,
                    b: 70
                }
            },

            {
                responsive: true,
                displaylogo: false
            }

        );

        return;
    }


    // ========================================================
    // LOGARITHMIC HISTOGRAM
    // ========================================================


    // Log scale requires positive values

    values = values.filter(
        function(value) {
            return value > 0;
        }
    );


    if (values.length === 0) {

        Plotly.purge("t90Chart");

        document
            .getElementById("t90Chart")
            .innerHTML =
                '<div class="warning">'
                + 'No positive T90 values available for log scale.'
                + '</div>';

        return;
    }


    const minValue =
        Math.min(...values);


    const maxValue =
        Math.max(...values);


    // ========================================================
    // SPECIAL CASE:
    // ALL VALUES IDENTICAL
    // ========================================================

    if (minValue === maxValue) {

        Plotly.react(

            "t90Chart",

            [
                {
                    x: [minValue],

                    y: [values.length],

                    type: "bar",

                    hovertemplate:
                        "T90: %{x:.4g} s<br>"
                        + "Count: %{y}"
                        + "<extra></extra>"
                }
            ],

            {
                title:
                    data.label
                    + " — T90 Distribution (Logarithmic)",

                xaxis: {
                    title: "T90 (seconds)",
                    type: "log"
                },

                yaxis: {
                    title: "Number of events"
                }
            }

        );

        return;
    }


    // ========================================================
    // LOG10 LIMITS
    // ========================================================

    const logMin =
        Math.log10(minValue);


    const logMax =
        Math.log10(maxValue);


    const logStep =
        (
            logMax - logMin
        )
        / numberOfBins;


    // ========================================================
    // CREATE LOGARITHMIC BIN EDGES
    // ========================================================

    const binEdges = [];


    for (
        let i = 0;
        i <= numberOfBins;
        i++
    ) {

        binEdges.push(

            Math.pow(

                10,

                logMin
                + i * logStep

            )

        );

    }


    // ========================================================
    // COUNT VALUES
    // ========================================================

    const counts =
        new Array(
            numberOfBins
        ).fill(0);


    values.forEach(
        function(value) {


            let index = Math.floor(

                (
                    Math.log10(value)
                    - logMin
                )

                / logStep

            );


            // Maximum value goes into last bin

            if (
                index === numberOfBins
            ) {

                index =
                    numberOfBins - 1;

            }


            if (
                index >= 0
                &&
                index < numberOfBins
            ) {

                counts[index]++;

            }

        }
    );


    // ========================================================
    // BIN CENTERS AND WIDTHS
    // ========================================================

    const binCenters = [];

    const binWidths = [];


    for (
        let i = 0;
        i < numberOfBins;
        i++
    ) {


        const left =
            binEdges[i];


        const right =
            binEdges[i + 1];


        // Geometric center

        binCenters.push(

            Math.sqrt(
                left * right
            )

        );


        binWidths.push(

            right - left

        );

    }


    // ========================================================
    // UPDATE INFO
    // ========================================================

    document
        .getElementById("t90Info")
        .textContent =

            "Dataset: "
            + data.label

            + " | Positive values: "
            + values.length

            + " | Range: "
            + minValue.toPrecision(3)

            + " – "
            + maxValue.toPrecision(3)

            + " s"

            + " | Scale: logarithmic"

            + " | Bins: "
            + numberOfBins;


    // ========================================================
    // DRAW LOG HISTOGRAM
    // ========================================================

    Plotly.react(

        "t90Chart",

        [
            {
                x:
                    binCenters,

                y:
                    counts,

                width:
                    binWidths,

                type:
                    "bar",

                hovertemplate:
                    "T90: %{x:.4g} s<br>"
                    + "Count: %{y}"
                    + "<extra></extra>"
            }
        ],

        {
            title:
                data.label
                + " — T90 Distribution (Logarithmic)",

            xaxis: {
                title: "T90 (seconds)",
                type: "log",
                autorange: true
            },

            yaxis: {
                title: "Number of events",
                type: "linear",
                autorange: true
            },

            bargap: 0.02,

            margin: {
                t: 60,
                l: 70,
                r: 30,
                b: 70
            }
        },

        {
            responsive: true,
            displaylogo: false
        }

    );

}

        ].text;


    let binSize;


    if (selectedValue === "M1") {

        binSize = "M1";

    }

    else {

        binSize =
            Number(selectedValue);

    }


    document
        .getElementById("dateInfo")
        .textContent =

            "Dataset: "
            + data.label

            + " | Valid trigger times: "
            + data.trigger_datetime.length

            + " | Bin size: "
            + selectedLabel;


    if (
        data.trigger_datetime.length === 0
    ) {

        Plotly.purge(
            "triggerDateChart"
        );


        document
            .getElementById(
                "triggerDateChart"
            )
            .innerHTML =

                '<div class="warning">'
                + 'No valid trigger dates found.'
                + '</div>';

        return;
    }


    Plotly.react(

        "triggerDateChart",

        [
            {
                x:
                    data.trigger_datetime,

                type:
                    "histogram",

                autobinx:
                    false,

                xbins: {
                    size:
                        binSize
                },

                hovertemplate:
                    "Date: %{x|%Y-%m-%d}<br>"
                    + "Events: %{y}"
                    + "<extra></extra>"
            }
        ],

        {
            title:
                data.label
                + " — Events over Time",

            xaxis: {

                title:
                    "Trigger date and time",

                type:
                    "date",

                tickformat:
                    "%Y-%m-%d",

                hoverformat:
                    "%Y-%m-%d %H:%M:%S.%L",

                tickangle:
                    -45,

                rangeslider: {
                    visible:
                        true
                },

                rangeselector: {

                    buttons: [

                        {
                            count: 7,
                            label: "7 days",
                            step: "day",
                            stepmode: "backward"
                        },

                        {
                            count: 1,
                            label: "1 month",
                            step: "month",
                            stepmode: "backward"
                        },

                        {
                            count: 6,
                            label: "6 months",
                            step: "month",
                            stepmode: "backward"
                        },

                        {
                            count: 1,
                            label: "1 year",
                            step: "year",
                            stepmode: "backward"
                        },

                        {
                            step: "all",
                            label: "All"
                        }

                    ]

                }

            },

            yaxis: {
                title:
                    "Number of events",

                autorange:
                    true
            },

            bargap:
                0.05,

            margin: {
                t: 80,
                l: 70,
                r: 30,
                b: 130
            }
        },

        {
            responsive:
                true,

            displaylogo:
                false
        }

    );

}


// ============================================================
// UPDATE BOTH CHARTS
// ============================================================

function updateAllCharts() {

    updateT90Chart();

    updateDateChart();

}


// ============================================================
// DATASET SELECTOR
// ============================================================

document
    .getElementById(
        "datasetSelector"
    )
    .addEventListener(

        "change",

        function() {

            currentDatasetId =
                this.value;

            updateAllCharts();

        }

    );


// ============================================================
// T90 SCALE SELECTOR
// ============================================================

document
    .getElementById(
        "t90Scale"
    )
    .addEventListener(

        "change",

        function() {

            updateT90Chart();

        }

    );


// ============================================================
// T90 BIN SELECTOR
// ============================================================

document
    .getElementById(
        "t90Bins"
    )
    .addEventListener(

        "change",

        function() {

            updateT90Chart();

        }

    );


// ============================================================
// DATE BIN SELECTOR
// ============================================================

document
    .getElementById(
        "dateBinSize"
    )
    .addEventListener(

        "change",

        function() {

            updateDateChart();

        }

    );


// ============================================================
// INITIAL DRAW
// ============================================================

updateAllCharts();


</script>


</body>

</html>
